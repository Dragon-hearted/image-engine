<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 148" width="800" height="148">
  <defs>
    <filter id="glow-0" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feFlood flood-color="#8B5CF6" flood-opacity="0.35" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker id="pipe-arrow" viewBox="0 0 10 6" refX="10" refY="3"
      markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#8B5CF6" />
    </marker>
  </defs>
  <text x="400" y="34" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0s" fill="freeze" />
    ImageEngine Pipeline
  </text>
<line x1="289.5" y1="86" x2="321.5" y2="86"
    stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#pipe-arrow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6000000000000001s" fill="freeze" />
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" begin="0.6000000000000001s" repeatCount="indefinite" />
  </line>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.4s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" begin="3.4s" repeatCount="indefinite" />
    <rect x="136.5" y="56" width="149" height="60" rx="10" fill="#8B5CF614" stroke="#8B5CF6" stroke-width="1.5" filter="url(#glow-0)" />
  <text x="211" y="80" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
      <tspan x="211" dy="0">generation</tspan>
  </text>

  </g>
<line x1="478.5" y1="86" x2="510.5" y2="86"
    stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#pipe-arrow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1s" fill="freeze" />
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="2s" begin="1s" repeatCount="indefinite" />
  </line>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" begin="3.8s" repeatCount="indefinite" />
    <rect x="325.5" y="56" width="149" height="60" rx="10" fill="#8B5CF614" stroke="#8B5CF6" stroke-width="1.5" filter="url(#glow-0)" />
  <text x="400" y="80" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
      <tspan x="400" dy="0">batch-execution</tspan>
  </text>

  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2000000000000002s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" begin="4.2s" repeatCount="indefinite" />
    <rect x="514.5" y="56" width="149" height="60" rx="10" fill="#8B5CF614" stroke="#8B5CF6" stroke-width="1.5" filter="url(#glow-0)" />
  <text x="589" y="80" text-anchor="middle" fill="#E0E0E0" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
      <tspan x="589" dy="0">budget-management</tspan>
  </text>

  </g>
</svg>