    <text x="400" y="130" text-anchor="middle" fill="#9CA3AF" font-family="Inter, system-ui, sans-serif" font-size="15">Centralized NanoBanana image generation service using WisGate (JuheAPI) with rate limiting, token-based cost tracking, budget guards, retry/backoff, batch parallel execution, and generation gallery</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.8s" fill="freeze" />
    <rect x="183" y="160" width="35" height="20" rx="10" fill="#8B5CF618" stroke="#8B5CF6" stroke-width="1" />
    <text x="200.5" y="174" text-anchor="middle" fill="#8B5CF6" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">ai</text>
  </g>
  <g opacity="0">
