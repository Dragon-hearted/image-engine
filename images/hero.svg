    <rect x="226" y="160" width="140" height="20" rx="10" fill="#10B98118" stroke="#10B981" stroke-width="1" />
    <text x="296" y="174" text-anchor="middle" fill="#10B981" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">image-generation</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze" />
    <rect x="374" y="160" width="102.5" height="20" rx="10" fill="#F59E0B18" stroke="#F59E0B" stroke-width="1" />
    <text x="425.25" y="174" text-anchor="middle" fill="#F59E0B" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="500">api-gateway</text>
  </g>
